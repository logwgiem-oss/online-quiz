<!DOCTYPE html>
<html>
<head>
    <title>Blooket Master Host</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #0f172a; color: #fff; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 600px; margin: 20px auto; }
        .btn { padding: 15px; font-size: 18px; width: 80%; border-radius: 8px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .start-btn { background: #10b981; } .stop-btn { background: #ef4444; margin-top: 20px; }
        .player-badge { display: inline-block; background: #334155; padding: 8px 16px; margin: 5px; border-radius: 20px; font-weight: bold; color: #f59e0b; font-size: 20px; }
        .code-box { background: #f59e0b; color: #0f172a; padding: 15px; border-radius: 12px; font-size: 32px; font-weight: bold; letter-spacing: 2px; max-width: 600px; margin: 20px auto; }
        #timer-display { font-size: 64px; color: #ef4444; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>
    <div id="main-ui">
        <h1>👑 Blooket Master Host Dashboard</h1>
        <div class="code-box" id="room-code-display">🔑 GENERATING CODE...</div>
        <div class="box">
            <h2>⏱️ Round Clock Timer</h2>
            <div id="timer-display">5:00</div><br>
            <button class="btn start-btn" onclick="hostStartGame()">🚀 LAUNCH GAME ROUND</button>
        </div>
        <div class="box">
            <h2>🏆 Live Standings & Lobby</h2>
            <div id="leaderboard">Lobby empty. Waiting for players...</div>
            <button class="btn stop-btn" onclick="hostEndGame()">🛑 FORCE END ROUND</button>
        </div>
    </div>
    <script>
        let myRoomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        let hostState = { players: {}, roundActive: false, timeLeft: 300, timerId: null };
        let ws;

        const questions = [
            { q: "What is the capital of France?", c: ["London", "Paris", "Rome", "Berlin"], a: "2" },
            { q: "Which planet is known as the Red Planet?", c: ["Earth", "Mars", "Jupiter", "Venus"], a: "2" },
            { q: "How many legs does a spider have?", c: ["6", "8", "10", "12"], a: "2" },
            { q: "What is the boiling point of water?", c: ["50°C", "100°C", "150°C", "200°C"], a: "2" },
            { q: "Which ocean is the largest on Earth?", c: ["Atlantic", "Indian", "Arctic", "Pacific"], a: "4" },
            { q: "What is the closest star to Earth?", c: ["The Sun", "Proxima Centauri", "Sirius", "North Star"], a: "1" },
            { q: "How many continents are there?", c: ["5", "6", "7", "8"], a: "3" },
            { q: "What is the hardest natural substance?", c: ["Gold", "Iron", "Diamond", "Ruby"], a: "3" },
            { q: "Who painted the Mona Lisa?", c: ["Van Gogh", "Da Vinci", "Picasso", "Monet"], a: "2" },
            { q: "What is the square root of 64?", c: ["6", "7", "8", "9"], a: "3" },
            { q: "What is the number of pi?", c: ["3", "1.96", "3.14", "6.357"], a: "3" },
            { q: "What is most practical for survival?", c: ["Water", "Shelter", "Warmth", "Friends"], a: "1" }
        ];

        window.onload = function() {
            document.getElementById('room-code-display').innerText = `🔑 JOIN CODE: ${myRoomCode}`;
            
            // Connect to the free public cloud lane pipeline
            ws = new WebSocket(`wss://free.echo.websocket.org`);
            
            ws.onmessage = function(event) {
                let msg = JSON.parse(event.data);
                if (msg.room !== myRoomCode) return;

                if (msg.type === 'joinRequest') {
                    hostState.players[msg.sender] = { id: msg.sender, name: msg.name, coins: 100 };
                    updateHostLeaderboard();
                } else if (msg.type === 'submitAnswer') {
                    handlePlayerAnswer(msg.sender, msg.guess, msg.correctIndex);
                } else if (msg.type === 'requestNextQuestion') {
                    sendQuestionToSinglePlayer(msg.sender);
                }
            };
        };

        function sendBroadcast(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        function updateHostLeaderboard() {
            const board = document.getElementById('leaderboard');
            let pList = Object.values(hostState.players).sort((a,b) => b.coins - a.coins);
            if (pList.length === 0) { board.innerHTML = "Lobby empty. Waiting for players..."; return; }
            board.innerHTML = pList.map((p, i) => `<div class="player-badge">#${i+1} ${p.name}: 🪙 ${p.coins}</div>`).join('');
        }

        function hostStartGame() {
            if (hostState.roundActive) return;
            hostState.roundActive = true;
            sendBroadcast({ type: 'gameStarted', room: myRoomCode });
            setTimeout(() => {
                Object.keys(hostState.players).forEach(uuid => { sendQuestionToSinglePlayer(uuid); });
            }, 400);
            
            hostState.timerId = setInterval(() => {
                hostState.timeLeft--;
                let mins = Math.floor(hostState.timeLeft / 60), secs = hostState.timeLeft % 60;
                document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
                
                if (hostState.timeLeft <= 0) { hostEndGame(); }
            }, 1000);
        }

        function sendQuestionToSinglePlayer(uuid) {
            let rand = Math.floor(Math.random() * questions.length);
            sendBroadcast({ type: 'nextQuestion', target: uuid, q: questions[rand].q, choices: questions[rand].c, correct: questions[rand].a, room: myRoomCode });
        }

        function handlePlayerAnswer(uuid, guess, correctIndex) {
            if (!hostState.roundActive || !hostState.players[uuid]) return;
            let player = hostState.players[uuid];
            if (guess === correctIndex) {
                let roll = Math.floor(Math.random() * 4), outcome = {};
                if (roll === 0) {
                    let cash = Math.floor(Math.random() * 50) + 20; player.coins += cash;
                    outcome = { type: "coins", display: `🪙 +${cash} Coins`, msg: `Plus +🪙 ${cash} Coins!` };
                } else if (roll === 1) {
                    let leader = Object.values(hostState.players).reduce((max, p) => p.coins > max.coins ? p : max, {coins: 0});
                    if (leader && leader.id !== uuid && leader.coins > 20) {
                        let stolen = Math.floor(leader.coins * 0.25); leader.coins -= stolen; player.coins += stolen;
                        outcome = { type: "steal", display: "🚨 25% STEAL", msg: `🚨 25% STEAL! You took 🪙 ${stolen} from ${leader.name}!` };
                    } else { player.coins += 30; outcome = { type: "coins", display: "🪙 +30 Coins", msg: `Gained +🪙 30 Coins!` }; }
                } else if (roll === 2) {
                    let pool = Object.values(hostState.players).filter(p => p.id !== uuid);
                    if (pool.length > 0) {
                        let victim = pool[Math.floor(Math.random() * pool.length)], temp = player.coins; player.coins = victim.coins; victim.coins = temp;
                        outcome = { type: "swap", display: "🔄 COIN SWAP", msg: `🔄 SWAPPED banks with ${victim.name}!` };
                    } else { player.coins += 40; outcome = { type: "coins", display: "🪙 +40 Coins", msg: `Gained +🪙 40 Coins!` }; }
                } else { player.coins *= 3; outcome = { type: "triple", display: "💥 TRIPLE!!!", msg: `💥 TRIPLE COINS JACKPOT!!!` }; }
                sendBroadcast({ type: 'coinResult', target: uuid, success: true, reward: outcome, room: myRoomCode });
            } else { sendBroadcast({ type: 'coinResult', target: uuid, success: false, room: myRoomCode }); }
            updateHostLeaderboard();
        }

        function hostEndGame() {
            clearInterval(hostState.timerId);
            let sorted = Object.values(hostState.players).sort((a,b) => b.coins - a.coins);
            let winner = sorted[0] || { name: "Nobody", coins: 0 };
            sendBroadcast({ type: 'gameOver', winnerName: winner.name, winnerCoins: winner.coins, room: myRoomCode });
        }
    </script>
</body>
</html>
