<!DOCTYPE html>
<html>
<head>
    <title>Blooket Player Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f8fafc; }
        .container { max-width: 500px; margin: auto; }
        input, .btn { padding: 15px; font-size: 18px; width: 100%; box-sizing: border-box; border-radius: 12px; border: none; margin-top: 10px; font-weight: bold; }
        input { border: 2px solid #cbd5e1; background: #fff; text-transform: uppercase; }
        /* Keep username lowercase typing normal, only room code uppercase */
        #username { text-transform: none; }
        .btn { color: white; cursor: pointer; background: #10b981; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .choice-btn { height: 120px; font-size: 18px; border-radius: 16px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .red { background: #ef4444; } .blue { background: #3b82f6; } .green { background: #10b981; } .yellow { background: #f59e0b; }
        
        #reward-zone { display: none; margin-top: 20px; }
        .wheel-box { width: 160px; height: 160px; border: 8px solid #1e293b; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; background: #f59e0b; color: white; transition: background 0.3s; }
        .spinning { animation: rollPrizes 0.15s linear infinite; background: #6366f1; }
        @keyframes rollPrizes { 100% { transform: rotate(360deg); } }
        
        .win-gold { background: #fef08a; color: #854d0e; padding: 15px; border-radius: 12px; font-weight: bold; }
        .lose-gold { background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 12px; font-weight: bold; }
        #waiting-room { font-size: 20px; margin-top: 50px; color: #475569; }
        
        /* ⏱️ Style for the 3-second freeze lock */
        .cooldown-text { font-size: 24px; color: #ef4444; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="game-container">
        <!-- 1. Entry Screen -->
        <div id="login-screen">
            <h1>🎒 Enter Quiz Lobby</h1>
            <!-- New Join Code Input Box -->
            <input type="text" id="roomcode" placeholder="Enter 4-Letter Join Code..." maxlength="4">
            <input type="text" id="username" placeholder="Type Your Nickname...">
            <button class="btn" onclick="joinLobby()">ENTER GAME</button>
        </div>

        <!-- 2. Waiting room -->
        <div id="waiting-room" style="display:none;">
            <h2>Logged in successfully! 👍</h2>
            <p>Look at the master monitor dashboard. Waiting for the host to press Start...</p>
        </div>

        <!-- 3. Active Game Loop Screen -->
        <div id="game-screen" style="display:none;">
            <h2 id="question-text" style="color: #1e293b; margin-bottom: 20px;">Loading question...</h2>
            
            <div id="reward-zone">
                <h3 id="spin-status">Spinning the Blooket Wheel...</h3>
                <div id="lucky-wheel" class="wheel-box">?</div>
                <div id="final-msg" style="margin-top: 15px; font-size: 18px;"></div>
            </div>

            <div class="grid" id="button-grid">
                <button id="b1" class="choice-btn red" onclick="pick('1')">---</button>
                <button id="b2" class="choice-btn blue" onclick="pick('2')">---</button>
                <button id="b3" class="choice-btn green" onclick="pick('3')">---</button>
                <button id="b4" class="choice-btn yellow" onclick="pick('4')">---</button>
            </div>
            
            <button id="next-btn" class="btn" style="display:none; background: #3b82f6; margin-top:20px;" onclick="getNext()">CONTINUE ➡️</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Connected directly to the hosting server link automatically
        const socket = io();

        let currentCorrectIndex = "";
        const visualPrizes = ["🪙 Coins", "🚨 Steal!", "🔄 Swap", "💥 Triple!"];

        function joinLobby() {
            const code = document.getElementById('roomcode').value.trim();
            const name = document.getElementById('username').value.trim();
            
            if (!code) {
                alert("Please enter a room code!");
                return;
            }
            if (!name) {
                alert("Please enter a nickname!");
                return;
            }

            // Send both name and code as an object to match the server setup
            socket.emit('joinQuiz', { name: name, roomCode: code });
        }

        // Listen for successful room joins from the server
        socket.on('joinSuccess', (code) => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('waiting-room').style.display = 'block';
        });

        // Listen for errors (like entering an expired or mistyped code)
        socket.on('joinError', (msg) => {
            alert(msg);
        });

        function pick(choiceNum) {
            document.getElementById('button-grid').style.pointerEvents = 'none';
            socket.emit('submitAnswer', { guess: choiceNum, correctIndex: currentCorrectIndex });
        }

        function getNext() {
            socket.emit('requestNextQuestion');
        }

        socket.on('gameStarted', () => {
            document.getElementById('waiting-room').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
        });

        socket.on('nextQuestion', (data) => {
            currentCorrectIndex = data.correct;
            document.getElementById('button-grid').style.display = 'grid';
            document.getElementById('button-grid').style.pointerEvents = 'auto';
            document.getElementById('reward-zone').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('b1').innerText = data.choices[0];
            document.getElementById('b2').innerText = data.choices[1];
            document.getElementById('b3').innerText = data.choices[2];
            document.getElementById('b4').innerText = data.choices[3];
        });

        socket.on('coinResult', (data) => {
            const grid = document.getElementById('button-grid');
            const rewardZone = document.getElementById('reward-zone');
            const wheel = document.getElementById('lucky-wheel');
            const status = document.getElementById('spin-status');
            const msgBox = document.getElementById('final-msg');
            const nextBtn = document.getElementById('next-btn');
            
            if (data.success) {
                grid.style.display = 'none';
                rewardZone.style.display = 'block';
                msgBox.innerText = "";
                status.innerText = "✨ CORRECT ANSWER!";
                wheel.classList.add('spinning');
                
                let shuffleTimer = setInterval(() => {
                    wheel.innerText = visualPrizes[Math.floor(Math.random() * visualPrizes.length)];
                }, 60);

                setTimeout(() => {
                    clearInterval(shuffleTimer);
                    wheel.classList.remove('spinning');
                    wheel.innerText = data.reward.display;
                    msgBox.className = "win-gold";
                    msgBox.innerText = data.reward.msg;
                    nextBtn.style.display = 'block';
                }, 1200);
            } else {
                grid.style.display = 'none';
                rewardZone.style.display = 'block';
                wheel.innerText = "❌";
                status.innerText = "INCORRECT!";
                
                let penaltyTime = 3;
                msgBox.className = "lose-gold";
                msgBox.innerHTML = `Wrong answer!<br><span class="cooldown-text">Locked out for ${penaltyTime}s...</span>`;
                
                let cooldownInterval = setInterval(() => {
                    penaltyTime--;
                    if (penaltyTime > 0) {
                        msgBox.innerHTML = `Wrong answer!<br><span class="cooldown-text">Locked out for ${penaltyTime}s...</span>`;
                    } else {
                        clearInterval(cooldownInterval);
                        rewardZone.style.display = 'none';
                        grid.style.display = 'grid';
                        grid.style.pointerEvents = 'auto';
                    }
                }, 1000);
            }
        });

        socket.on('gameOver', (winnerList) => {
            let topPlayer = winnerList[0] || {name: "Nobody", coins: 0};
            document.getElementById('game-container').innerHTML = `
                <h1 style="font-size:36px; color:#1e293b;">⏰ TIME UP!</h1>
                <hr>
                <h2>🏆 Final Winner: ${topPlayer.name}</h2>
                <p style="font-size:22px; color:#f59e0b;">Total Bank: 🪙 <b>${topPlayer.coins}</b> coins!</p>
            `;
        });
    </script>
</body>
</html>
